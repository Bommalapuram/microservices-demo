apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Bommalapuram/microservices-demo.git'
    targetRevision: HEAD
    path: helm-chart # మీ రిపోజిటరీ లోపల హెల్మ్ చార్ట్ ఫోల్డర్ పేరు
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true # ఇదో ఆటోమేటిక్ సింక్ ని ఎనేబుల్ చేస్తుంది!
